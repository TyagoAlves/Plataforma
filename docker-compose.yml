version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plataforma-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./storage:/var/www/storage
      - ./database/database.sqlite:/var/www/database/database.sqlite
    networks:
      - plataforma
    environment:
      - QUEUE_CONNECTION=database

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plataforma-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --tries=3 --timeout=120
    volumes:
      - ./storage:/var/www/storage
      - ./database/database.sqlite:/var/www/database/database.sqlite
    networks:
      - plataforma
    environment:
      - QUEUE_CONNECTION=database
    depends_on:
      - app

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plataforma-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./storage:/var/www/storage
      - ./database/database.sqlite:/var/www/database/database.sqlite
    networks:
      - plataforma
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: plataforma-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - plataforma
    depends_on:
      - app

networks:
  plataforma:
    driver: bridge
